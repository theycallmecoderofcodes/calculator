<!DOCTYPE html>
<html>
<head>
    <title>iPhone Style Calculator</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: black;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .calculator {
            width: 260px;
        }

        #display {
            width: 100%;
            height: 80px;
            font-size: 40px;
            text-align: right;
            border: none;
            background: black;
            color: white;
            padding: 10px;
            box-sizing: border-box;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            height: 60px;
            border-radius: 50%;
            border: none;
            font-size: 20px;
            cursor: pointer;
        }

        .gray {
            background: #a5a5a5;
            color: black;
        }

        .dark {
            background: #333;
            color: white;
        }

        .orange {
            background: #ff9500;
            color: white;
        }

        .zero {
            grid-column: span 2;
            border-radius: 30px;
            text-align: left;
            padding-left: 25px;
        }

        button:active {
            filter: brightness(130%);
        }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" disabled>

    <div class="buttons">
        <button class="gray" onclick="clearDisplay()">AC</button>
        <button class="gray" onclick="press('%')">%</button>
        <button class="gray" onclick="press('/')">÷</button>
        <button class="orange" onclick="press('*')">×</button>

        <button class="dark" onclick="press('7')">7</button>
        <button class="dark" onclick="press('8')">8</button>
        <button class="dark" onclick="press('9')">9</button>
        <button class="orange" onclick="press('-')">−</button>

        <button class="dark" onclick="press('4')">4</button>
        <button class="dark" onclick="press('5')">5</button>
        <button class="dark" onclick="press('6')">6</button>
        <button class="orange" onclick="press('+')">+</button>

        <button class="dark" onclick="press('1')">1</button>
        <button class="dark" onclick="press('2')">2</button>
        <button class="dark" onclick="press('3')">3</button>
        <button class="orange" onclick="calculate()">=</button>

        <button class="dark zero" onclick="press('0')">0</button>
        <button class="dark" onclick="press('.')">.</button>
        <button class="gray" onclick="clearDisplay()">AC</button>
                   <button class="gray" onclick="toggleSign()">±</button>
                   <button class="gray" onclick="percentage()">%</button>
                   <button class="orange" onclick="press('/')">÷</button>
                   <button class="gray" onclick="backspace()">⌫</button>
    </div>
</div>

    <script>
    let display = document.getElementById("display");

    function press(value) {
        display.value += value;
    }

    function clearDisplay() {
        display.value = "";
    }

    function calculate() {
        try {
            display.value = eval(display.value);
        } catch {
            display.value = "Error";
        }
    }

    function backspace() {
        display.value = display.value.slice(0, -1);
    }

    function toggleSign() {
        if (display.value) {
            if (display.value.startsWith("-")) {
                display.value = display.value.slice(1);
            } else {
                display.value = "-" + display.value;
            }
        }
    }

    function percentage() {
        try {
            display.value = eval(display.value) / 100;
        } catch {
            display.value = "Error";
        }
    }
</script>

</body>
</html>
